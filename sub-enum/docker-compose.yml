version: '3.8'

services:
  sub-enum:
    build: .
    image: sub-enum:latest
    container_name: sub-enum
    user: "1000:1000" # runs as non-root user; adjust if needed
    volumes:
      - ./scans:/app/scans
      - ./targets.txt:/app/targets.txt:ro
      - subenum-data:/home/subenum/.sub-enum
    environment:
      - PIP_NO_CACHE_DIR=1
    secrets:
      - chaos_key
      - chaos_api_key
      - subfinder_api_key
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      for secret in /run/secrets/*; do
        [ -f "$secret" ] || continue;
        case "$(basename "$secret")" in
          chaos_key) export CHAOS_KEY="$(cat "$secret")" ;;
          chaos_api_key) export CHAOS_API_KEY="$(cat "$secret")" ;;
          subfinder_api_key) export SUBFINDER_API_KEY="$(cat "$secret")" ;;
        esac;
      done;
      exec sub-enum -L /app/targets.txt --workers 4 --yes
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

# Example usage notes:
# 1. Place your targets list in ./targets.txt (one domain per line).
# 2. Create ./scans directory to collect outputs.
# 3. Build and run:
#    docker compose up --build

secrets:
  chaos_key:
    file: ./secrets/chaos_key.txt
  chaos_api_key:
    file: ./secrets/chaos_api_key.txt
  subfinder_api_key:
    file: ./secrets/subfinder_api_key.txt

volumes:
  subenum-data: