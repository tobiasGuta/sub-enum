version: '3.8'

services:
  sub-enum:
    build: .
    image: sub-enum:latest
    container_name: sub-enum
    volumes:
      - ./scans:/app/scans
      - ./entrypoint.sh:/usr/local/bin/sub-enum-entrypoint.sh:ro
      - ./targets.txt:/app/targets.txt:ro
      - ./subenum-data:/home/subenum/.sub-enum
    environment:
      - PIP_NO_CACHE_DIR=1
    secrets:
      - chaos_key
      - chaos_api_key
      - subfinder_api_key
    working_dir: /app/scans
    entrypoint: ["/bin/sh", "-c", "/usr/local/bin/sub-enum-entrypoint.sh"]
    command: []
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

# Example usage notes:
# 1. Place your targets list in ./targets.txt (one domain per line).
# 2. Create ./scans directory to collect outputs.
# 3. Build and run:
#    docker compose up --build

secrets:
  chaos_key:
    file: ./secrets/chaos_key.txt
  chaos_api_key:
    file: ./secrets/chaos_api_key.txt
  subfinder_api_key:
    file: ./secrets/subfinder_api_key.txt

volumes:
  subenum-data: